<style>/* Mobile-only elements — hidden by default */
.mobile-tabs{display:none}
.pitch-pane{display:flex}
.side{display:flex}
.mobile-slots-bar{display:none}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
#root{height:100%}
body{font-family:var(--font-ui);background:var(--bg);color:var(--ink);
  -webkit-font-smoothing:antialiased;overflow:hidden}
:root{
  --font-ui:'Archivo',system-ui,sans-serif;
  --font-display:'Archivo',system-ui,sans-serif;
}

/* ---- THEME: broadcast (dark / FIFA) ---- */
[data-theme="broadcast"]{
  --bg:#0a0e14; --panel:#121822; --panel2:#0e141d; --card:#161e29;
  --ink:#eef3f8; --ink-dim:#8a97a8; --line:rgba(255,255,255,.09);
  --accent:#F0BC42; --accent2:#4a7fd4; --accent-ink:#1a1206;
  --pitch-a:#10371f; --pitch-b:#0d2e1a; --pitch-line:rgba(255,255,255,.16);
  --radius:9px; --shadow:0 10px 30px rgba(0,0,0,.45);
  --font-ui:'Archivo',system-ui,sans-serif; --font-display:'Archivo',system-ui,sans-serif;
  --display-weight:800; --display-tracking:-.02em; --display-upper:uppercase;
}
/* ---- THEME: panini (retro sticker) ---- */
[data-theme="panini"]{
  --bg:#e8dcc4; --panel:#f6efe0; --panel2:#efe6d3; --card:#fffdf7;
  --ink:#132339; --ink-dim:#77839a; --line:rgba(19,35,57,.14);
  --accent:#0E2A5C; --accent2:#F0BC42; --accent-ink:#fff; --win:#00A862;
  --pitch-a:#3f8f4f; --pitch-b:#388447; --pitch-line:rgba(255,255,255,.5);
  --radius:5px; --shadow:0 6px 0 rgba(19,35,57,.12), 0 12px 26px rgba(19,35,57,.18);
  --font-ui:'Roboto Flex','Archivo',system-ui,sans-serif; --font-display:'Oswald',sans-serif;
  --display-weight:600; --display-tracking:.01em; --display-upper:uppercase;
}
/* ---- THEME: clean (light / grass) ---- */
[data-theme="clean"]{
  --bg:#eef1ef; --panel:#ffffff; --panel2:#f6f8f7; --card:#ffffff;
  --ink:#13181a; --ink-dim:#697479; --line:rgba(0,0,0,.09);
  --accent:#13a05a; --accent2:#1769d6; --accent-ink:#fff;
  --pitch-a:#49a464; --pitch-b:#43995b; --pitch-line:rgba(255,255,255,.55);
  --radius:15px; --shadow:0 12px 34px rgba(20,40,30,.10);
  --font-ui:'Manrope',system-ui,sans-serif; --font-display:'Manrope',system-ui,sans-serif;
  --display-weight:800; --display-tracking:-.02em; --display-upper:none;
}

.app{height:100%;width:100%;display:flex;flex-direction:column;overflow:hidden}
.display{font-family:var(--font-display);font-weight:var(--display-weight);
  letter-spacing:var(--display-tracking);text-transform:var(--display-upper)}

/* ================= TOP BAR ================= */
.topbar{display:flex;align-items:center;gap:14px;padding:12px 20px;
  border-bottom:1px solid var(--line);background:var(--panel);flex:0 0 auto;z-index:5}
.brand{font-family:var(--font-display);font-weight:var(--display-weight);
  text-transform:var(--display-upper);letter-spacing:var(--display-tracking);
  font-size:18px;display:flex;align-items:center;gap:9px;white-space:nowrap}
.brand .dot{width:11px;height:11px;border-radius:50%;background:var(--accent);
  box-shadow:0 0 0 4px color-mix(in srgb,var(--accent) 22%,transparent)}
.topbar .spacer{flex:1}
.theme-switch{display:flex;gap:4px;background:var(--panel2);border:1px solid var(--line);
  border-radius:999px;padding:4px}
.theme-switch button{font:inherit;font-size:12px;font-weight:600;border:0;cursor:pointer;
  padding:6px 13px;border-radius:999px;background:transparent;color:var(--ink-dim);
  transition:.15s;text-transform:capitalize}
.theme-switch button.on{background:var(--accent);color:var(--accent-ink)}
.theme-switch button:not(.on):hover{color:var(--ink)}

/* ================= GENERIC SCREEN ================= */
.screen{flex:1;min-height:0;overflow:auto;display:flex;flex-direction:column}
.center-wrap{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:36px 24px;gap:34px;text-align:center}
.eyebrow{font-size:12.5px;letter-spacing:.22em;text-transform:uppercase;
  color:var(--ink-dim);font-weight:700}
.h1{font-family:var(--font-display);font-weight:var(--display-weight);
  text-transform:var(--display-upper);letter-spacing:var(--display-tracking);
  font-size:clamp(30px,5.5vw,54px);line-height:1.02}
.h1 em{font-style:normal;color:var(--accent)}
.sub{color:var(--ink-dim);font-size:16px;max-width:520px;line-height:1.5}

/* ---- formation cards ---- */
.formation-grid{display:flex;gap:20px;flex-wrap:wrap;justify-content:center}
.fcard{width:230px;background:var(--card);border:1.5px solid var(--line);
  border-radius:var(--radius);padding:18px;cursor:pointer;transition:.18s;text-align:left;
  position:relative;box-shadow:var(--shadow)}
.fcard:hover{transform:translateY(-3px);border-color:color-mix(in srgb,var(--accent) 55%,var(--line))}
.fcard.sel{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 28%,transparent),var(--shadow)}
.fcard .fname{font-family:var(--font-display);font-weight:var(--display-weight);
  font-size:26px;letter-spacing:.02em}
.fcard .fsub{color:var(--ink-dim);font-size:12.5px;margin-top:3px;line-height:1.35;min-height:34px}
.mini-pitch{position:relative;width:100%;aspect-ratio:5/6;margin:14px 0 6px;border-radius:6px;
  background:linear-gradient(var(--pitch-a),var(--pitch-b));overflow:hidden}
.mini-pitch::before{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(180deg,rgba(255,255,255,.05) 0 16px,transparent 16px 32px)}
.mini-dot{position:absolute;width:13px;height:13px;border-radius:50%;
  background:#fff;transform:translate(-50%,-50%);box-shadow:0 1px 3px rgba(0,0,0,.4)}
.mini-dot.gk{background:var(--accent)}
.fcard .check{position:absolute;top:14px;right:14px;width:24px;height:24px;border-radius:50%;
  background:var(--accent);color:var(--accent-ink);display:none;align-items:center;
  justify-content:center;font-size:14px;font-weight:900}
.fcard.sel .check{display:flex}

/* ---- buttons ---- */
.btn{font-family:var(--font-display);font-weight:var(--display-weight);
  text-transform:var(--display-upper);letter-spacing:.04em;font-size:17px;
  border:0;cursor:pointer;padding:15px 34px;border-radius:var(--radius);
  background:var(--accent);color:var(--accent-ink);transition:.15s;
  box-shadow:0 6px 18px color-mix(in srgb,var(--accent) 35%,transparent)}
.btn:hover{filter:brightness(1.06);transform:translateY(-2px)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.btn.ghost{background:transparent;color:var(--ink);border:1.5px solid var(--line);
  box-shadow:none;text-transform:none;font-family:var(--font-ui);font-weight:700;font-size:14px;
  padding:11px 20px;letter-spacing:0}
.btn.ghost:hover{border-color:var(--accent);color:var(--accent)}

/* ================= DRAFT LAYOUT ================= */
.draft{display:grid;grid-template-columns:1fr 372px;gap:0;flex:1;min-height:0}
.pitch-pane{position:relative;display:flex;flex-direction:column;min-height:0;
  background:var(--panel2);padding:16px 20px}
.draft-head{display:flex;align-items:center;gap:14px;flex:0 0 auto;padding-bottom:12px}
.round-chip{display:flex;flex-direction:column;line-height:1}
.round-chip .lab{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-dim);font-weight:700}
.round-chip .val{font-family:var(--font-display);font-weight:var(--display-weight);font-size:30px;margin-top:3px}
.round-chip .val small{color:var(--ink-dim);font-size:17px}
.formation-pill{font-family:var(--font-display);font-weight:var(--display-weight);
  font-size:15px;padding:7px 14px;border-radius:999px;background:var(--card);
  border:1px solid var(--line);letter-spacing:.03em;white-space:nowrap}
.respins{margin-left:auto;display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--ink-dim);font-weight:600;white-space:nowrap}
.respins .pips{display:flex;gap:4px}
.respins .pip{width:9px;height:9px;border-radius:50%;background:var(--accent)}
.respins .pip.used{background:var(--line)}

/* ---- pitch ---- */
.pitch-frame{flex:1;min-height:0;display:flex;align-items:center;justify-content:center}
.pitch{position:relative;height:100%;aspect-ratio:5/6;max-width:100%;max-height:100%;
  background:linear-gradient(var(--pitch-a),var(--pitch-b));border-radius:12px;
  border:2px solid color-mix(in srgb,#000 14%,var(--pitch-a));overflow:hidden;
  box-shadow:inset 0 0 70px rgba(0,0,0,.28)}
.pitch::before{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(180deg,rgba(255,255,255,.045) 0 11%,transparent 11% 22%)}
.pitch-lines{position:absolute;inset:0;pointer-events:none}
.pitch-lines>div{position:absolute;border:2px solid var(--pitch-line)}
.pl-circle{width:34%;aspect-ratio:1;border-radius:50%;left:33%;top:42%}
.pl-half{left:0;right:0;top:50%;height:0;border-width:2px 0 0 0}
.pl-box{left:26%;right:26%;bottom:0;height:16%;border-bottom:0}
.pl-box6{left:37%;right:37%;bottom:0;height:7%;border-bottom:0}

.slot{position:absolute;transform:translate(-50%,-50%);z-index:2}
.slot-empty{width:74px;height:74px;border-radius:50%;border:2px dashed var(--pitch-line);
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  color:#fff;background:rgba(0,0,0,.16);transition:.15s}
.slot-empty .role{font-family:var(--font-display);font-weight:var(--display-weight);
  font-size:13px;opacity:.92;letter-spacing:.04em}
.slot.eligible .slot-empty{border-style:solid;border-color:var(--accent);
  background:color-mix(in srgb,var(--accent) 34%,rgba(0,0,0,.2));
  cursor:pointer;animation:pulse 1.3s ease-in-out infinite;box-shadow:0 0 0 4px color-mix(in srgb,var(--accent) 22%,transparent)}
.slot.eligible .slot-empty:hover{transform:scale(1.07)}
.slot.eligible .slot-empty .role{color:#fff}
@keyframes pulse{0%,100%{box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 16%,transparent)}
  50%{box-shadow:0 0 0 8px color-mix(in srgb,var(--accent) 30%,transparent)}}

.player-token{width:96px;display:flex;flex-direction:column;align-items:center;gap:4px;
  cursor:default;animation:drop .4s cubic-bezier(.2,1.3,.4,1)}
@keyframes drop{0%{transform:translateY(-14px) scale(.7)}100%{transform:none}}
.token-badge{position:relative;width:54px;height:54px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;color:#fff;
  font-family:var(--font-display);font-weight:var(--display-weight);font-size:18px;
  border:2.5px solid #fff;box-shadow:0 4px 12px rgba(0,0,0,.4)}
.token-badge .rt{position:absolute;bottom:-7px;right:-9px;background:var(--accent);
  color:var(--accent-ink);font-size:11px;font-weight:900;border-radius:6px;
  padding:1px 5px;border:1.5px solid #fff;font-family:var(--font-ui)}
.token-name{font-size:12px;font-weight:800;color:#fff;text-align:center;line-height:1.1;
  text-shadow:0 1px 4px rgba(0,0,0,.7);max-width:104px}
.token-meta{font-size:10px;color:rgba(255,255,255,.82);font-weight:600;
  text-shadow:0 1px 3px rgba(0,0,0,.7)}

/* ================= SIDE PANEL ================= */
.side{background:var(--panel);border-left:1px solid var(--line);display:flex;
  flex-direction:column;min-height:0}
.side-spin{padding:22px 22px 16px;border-bottom:1px solid var(--line);text-align:center;display:flex;flex-direction:column;align-items:center}
.spin-roulette{display:flex;flex-direction:column;align-items:center;gap:8px;margin-top:12px;animation:roulette-pop .12s ease-out}
.spin-flag{width:72px;height:72px;border-radius:50%;object-fit:cover;border:3px solid var(--accent);box-shadow:0 0 16px color-mix(in srgb,var(--accent) 40%,transparent)}
.spin-flag-placeholder{width:72px;height:72px;border-radius:50%;background:var(--panel2);border:3px solid var(--accent)}
.spin-team-name{font-family:var(--font-display);font-weight:var(--display-weight);font-size:18px;letter-spacing:.02em;text-align:center}
@keyframes roulette-pop{from{transform:scale(0.85);opacity:0.4}to{transform:scale(1);opacity:1}}
.spin-stage{min-height:148px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.spin-hint{color:var(--ink-dim);font-size:13.5px;line-height:1.45;max-width:280px}
.spin-btn{font-family:var(--font-display);font-weight:var(--display-weight);
  text-transform:uppercase;letter-spacing:.08em;font-size:22px;border:0;cursor:pointer;
  width:150px;height:150px;border-radius:50%;background:var(--accent);color:var(--accent-ink);
  transition:.15s;box-shadow:0 10px 28px color-mix(in srgb,var(--accent) 40%,transparent);
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;
  overflow:hidden;position:relative}
.spin-btn small{font-size:10px;letter-spacing:.16em;opacity:.8;font-weight:600}
.spin-btn:hover{transform:scale(1.04);filter:brightness(1.05)}
.spin-btn:disabled{opacity:.5;cursor:not-allowed}
.spin-btn.spinning{animation:none}
.spin-btn-flag{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:50%;animation:roulette-pop .1s ease-out}
@keyframes spin{to{transform:rotate(360deg)}}

/* revealed team header */
.team-head{display:flex;align-items:center;gap:13px;text-align:left;width:100%}
.crest{width:48px;height:54px;flex:0 0 auto;border-radius:50%;
  display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;
  font-family:var(--font-display);font-size:14px;border:2px solid rgba(255,255,255,.6);
  box-shadow:0 3px 9px rgba(0,0,0,.3);position:relative;overflow:hidden}
.crest.flag{border-radius:50%;background:var(--card);border:2.5px solid var(--card);
  box-shadow:0 3px 10px rgba(0,0,0,.3),0 0 0 1.5px var(--line)}
.crest.flag img{width:100%;height:100%;object-fit:cover;display:block}
.team-head .tinfo{flex:1;min-width:0}
.team-head .tname{font-family:var(--font-display);font-weight:var(--display-weight);
  font-size:21px;line-height:1;letter-spacing:.01em}
.team-head .tyear{color:var(--ink-dim);font-size:13px;font-weight:600;margin-top:3px}
.team-head .champ-tag{display:inline-block;margin-top:5px;font-size:10px;font-weight:800;
  letter-spacing:.1em;text-transform:uppercase;padding:2px 7px;border-radius:4px;
  background:color-mix(in srgb,var(--accent) 20%,transparent);color:var(--accent)}
.respin-row{display:flex;gap:8px;align-items:center;justify-content:flex-end;
  padding:10px 22px 0;font-size:12px;color:var(--ink-dim)}

.pick-prompt{padding:11px 22px;font-size:12.5px;color:var(--ink-dim);font-weight:600;
  border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px}
.pick-prompt b{color:var(--ink)}

/* player list */
.player-list{flex:1;min-height:0;overflow-y:auto;padding:10px 14px 18px;display:flex;
  flex-direction:column;gap:7px}
.prow{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:10px;
  border:1.5px solid var(--line);background:var(--card);cursor:pointer;transition:.13s;
  text-align:left}
.prow:hover{border-color:color-mix(in srgb,var(--accent) 50%,var(--line))}
.prow.sel{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 9%,var(--card))}
.prow.disabled{opacity:.4;cursor:not-allowed;filter:grayscale(.5)}
.prow.disabled:hover{border-color:var(--line)}
.prat{width:42px;height:42px;flex:0 0 auto;border-radius:9px;background:var(--panel2);
  border:1px solid var(--line);display:flex;flex-direction:column;align-items:center;
  justify-content:center;line-height:1}
.prat .n{font-family:var(--font-display);font-weight:var(--display-weight);font-size:19px}
.prat .l{font-size:8px;letter-spacing:.1em;color:var(--ink-dim);font-weight:700;margin-top:1px}
.pmid{flex:1;min-width:0}
.pname{font-weight:800;font-size:14.5px;line-height:1.15;white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis}
.ptags{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.ptag{font-size:9.5px;font-weight:800;letter-spacing:.04em;padding:2px 6px;border-radius:4px;
  background:var(--panel2);color:var(--ink-dim);border:1px solid var(--line)}
.ptag.fit{background:color-mix(in srgb,var(--accent) 18%,transparent);
  color:var(--accent);border-color:transparent}
.pstats{display:flex;gap:11px;flex:0 0 auto;text-align:center}
.pstat{display:flex;flex-direction:column;line-height:1}
.pstat .v{font-family:var(--font-display);font-weight:var(--display-weight);font-size:16px}
.pstat .k{font-size:8px;letter-spacing:.08em;color:var(--ink-dim);font-weight:700;
  text-transform:uppercase;margin-top:2px}

.placed-flash{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  pointer-events:none;z-index:9}

/* ================= FINAL ================= */
.final{flex:1;min-height:0;display:flex;flex-direction:column;align-items:center;
  padding:22px 20px;gap:16px;overflow:auto}
.final>div:first-child{width:100%;max-width:700px}
.final .pitch-frame{flex:0 0 auto;width:100%;height:min(66vh,580px)}
.final-actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}

/* ================= CUP / TOURNAMENT ================= */
.cup{flex:1;min-height:0;overflow:auto;display:flex;flex-direction:column;align-items:center;
  padding:30px 20px 60px;gap:22px}
.cup-top{text-align:center;width:100%;max-width:680px}
.cup-strength{color:var(--ink-dim);font-size:14px;margin-top:8px;font-weight:600}
.cup-strength b{color:var(--ink);font-family:var(--font-display);font-weight:var(--display-weight);font-size:17px}
.ladder{width:min(560px,100%);display:flex;flex-direction:column;gap:10px}
.lstage{display:flex;align-items:center;gap:14px;padding:13px 18px;border-radius:var(--radius);
  background:var(--card);border:1.5px solid var(--line);opacity:0;transform:translateX(-16px);
  transition:opacity .45s ease,transform .45s cubic-bezier(.2,.9,.3,1);box-shadow:var(--shadow)}
.lstage.show{opacity:1;transform:none}
.lstage.lost{border-color:color-mix(in srgb,#e5484d 50%,var(--line))}
.lstage-name{font-family:var(--font-display);font-weight:var(--display-weight);font-size:18px;flex:1;letter-spacing:.01em}
.lstage-mid{display:flex;flex-direction:column;align-items:flex-end;gap:1px;text-align:right;
  flex:0 0 auto;white-space:nowrap}
.lstage-opp{font-size:12px;color:var(--ink-dim);font-weight:600}
.lstage-score{font-family:var(--font-display);font-weight:var(--display-weight);font-size:20px;line-height:1.05}
.lstage-sub{font-size:10.5px;color:var(--ink-dim);font-weight:600}
.lstage-mark{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:17px;font-weight:900;flex:0 0 auto}
.lstage.won .lstage-mark{background:color-mix(in srgb,var(--win) 24%,transparent);color:var(--win)}
.lstage.lost .lstage-mark{background:color-mix(in srgb,#e5484d 18%,transparent);color:#e5484d}
.lstage.gsum{background:color-mix(in srgb,var(--accent) 9%,var(--card));
  border-style:dashed;border-color:color-mix(in srgb,var(--accent) 45%,var(--line))}
.lstage.gsum.lost{background:color-mix(in srgb,#e5484d 8%,var(--card));
  border-color:color-mix(in srgb,#e5484d 45%,var(--line))}
.lstage.gsum .lstage-name{font-size:16px}

.verdict{width:min(560px,100%);text-align:center;padding:30px 24px;border-radius:calc(var(--radius) + 5px);
  background:var(--card);border:1.5px solid var(--line);box-shadow:var(--shadow);
  display:flex;flex-direction:column;align-items:center;gap:7px;animation:drop .5s cubic-bezier(.2,1.2,.4,1)}
.verdict.win{border-color:var(--win);
  box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 30%,transparent),var(--shadow)}
.verdict-medal{font-size:58px;line-height:1}
.verdict-tag{font-family:var(--font-display);font-weight:var(--display-weight);text-transform:uppercase;
  letter-spacing:.04em;font-size:clamp(26px,4.6vw,42px);line-height:1.02}
.verdict.win .verdict-tag{color:var(--win)}
.verdict-line{color:var(--ink-dim);font-size:14.5px;max-width:380px;line-height:1.45}
.verdict-stat{margin-top:6px;font-size:14px;color:var(--ink-dim);font-weight:600}
.verdict-stat b{font-family:var(--font-display);font-weight:var(--display-weight);
  font-size:17px;color:var(--ink)}
.cup-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:16px}
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--panel);
  padding:11px 20px;border-radius:999px;font-weight:700;font-size:13px;z-index:50;
  box-shadow:0 8px 24px rgba(0,0,0,.35);animation:drop .3s ease}

    justify-content:center;
  }
  .mobile-slot{
    width:48px;height:48px;border-radius:50%;
    border:2px dashed var(--line);
    background:var(--panel);
    display:flex;align-items:center;justify-content:center;
    font-size:11px;font-weight:700;color:var(--ink-dim);
    letter-spacing:.02em;text-transform:uppercase;
    transition:all .15s;cursor:default;
    flex-shrink:0;
  }
  .mobile-slot.eligible{
    border:2px solid var(--accent);
    background:color-mix(in srgb,var(--accent) 15%,var(--panel));
    color:var(--accent);
    cursor:pointer;
    animation:slot-pulse .8s ease-in-out infinite;
    transform:scale(1.12);
  }
  .mobile-slot.filled{
    border:2px solid var(--ink-dim);
    background:var(--panel2);
    color:var(--ink);
    font-size:10px;
  }
  .mobile-slot.filled.eligible{
    border:2px solid var(--accent);
    background:color-mix(in srgb,var(--accent) 15%,var(--panel));
    color:var(--accent);
    transform:scale(1.12);
  }
  @keyframes slot-pulse{
    0%,100%{box-shadow:0 0 0 0 color-mix(in srgb,var(--accent) 40%,transparent)}

  }
  .mobile-slot-label{font-size:10px;font-weight:800;text-align:center;line-height:1}

  .center-wrap{padding:12px 16px !important}
}

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});
</script>
<script>// Women's European Draft — tournament simulation
// Modern Women's Champions League format: 18-team league phase (6 matches, two opponents from
// each of three pots), top 4 straight to the quarter-finals, 5th–12th into a two-legged
// play-off, 13th–18th out. Then two-legged QF + SF and a one-off final.
(function (G) {
  // 2025/26 league-phase field in three seeding pots (name, rating)
  const POTS = [
    [['Barcelona',93],['OL Lyonnes',91],['Chelsea',90],['Arsenal',90],['Bayern',88],['Wolfsburg',86]],
    [['Paris SG',85],['Juventus',84],['Real Madrid',84],['Man United',82],['Atlético',81],['Roma',81]],
    [['Benfica',79],['Paris FC',78],['Twente',77],['St. Pölten',75],['Vålerenga',75],['OH Leuven',74]],
  ];

  const rint = (n) => Math.floor(Math.random() * n);
  const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

  // One match. League: draws allowed. Knockout leg: draws allowed (aggregate decides).
  function playMatch(strength, oppRating, home) {
    const d = strength - oppRating + (home === null ? 0 : home ? 1.4 : -1.4) - 0.5;
    const eW = Math.exp(d / 4.6), eL = Math.exp(-d / 4.6), eD = 1.25;
    const tot = eW + eL + eD;
    const pW = eW / tot, pD = eD / tot;
    const roll = Math.random();
    let result, gf, ga;
    if (roll < pW) { result = 'W'; gf = 1 + rint(3); ga = rint(gf); }
    else if (roll < pW + pD) { result = 'D'; gf = rint(3); ga = gf; }
    else { result = 'L'; ga = 1 + rint(3); gf = rint(ga); }
    return { result, gf, ga, winPct: Math.round(pW * 100) };
  }

  function drawFrom(potIdx, used) {
    const pool = POTS[potIdx].filter(([n]) => !used.has(n));
    const pick = pool[rint(pool.length)] || POTS[potIdx][rint(POTS[potIdx].length)];
    used.add(pick[0]);
    return pick;
  }

  // Opponent rating band per knockout round
  const KO_ROUNDS = [
    { key:'po',  name:'Play-off',      lo:77, hi:83 },
    { key:'qf',  name:'Quarter-final', lo:81, hi:87 },
    { key:'sf',  name:'Semi-final',    lo:84, hi:90 },
  ];

  function drawKO(lo, hi, used) {
    const all = POTS.flat().filter(([n, r]) => !used.has(n) && r >= lo && r <= hi);
    const pick = all.length ? all[rint(all.length)]
      : POTS.flat().filter(([n]) => !used.has(n)).sort((a,b)=>Math.abs(a[1]-(lo+hi)/2)-Math.abs(b[1]-(lo+hi)/2))[0]
      || POTS[1][rint(6)];
    used.add(pick[0]);
    return pick;
  }

  function simulateCup(ratings, fk) {
    const sorted = ratings.slice().sort((a, b) => b - a);
    const avg = ratings.reduce((s, r) => s + r, 0) / ratings.length;
    const strength = avg + (sorted[0] - avg) * 0.15;

    const used = new Set();
    const entries = [];
    let totGf = 0, totGa = 0, w = 0, d = 0, l = 0;

    function record(stage, opp, m) {
      totGf += m.gf; totGa += m.ga;
      if (m.result === 'W') w++; else if (m.result === 'D') d++; else l++;
      entries.push({ kind:'match', stage, opp, score:`${m.gf}\u2013${m.ga}`,
        sub: m.sub || `${m.winPct}% to win`, won: m.result==='W', draw: m.result==='D', result: m.result });
      return m;
    }

    // ---- League phase: 6 matches, two opponents from each of the three pots ----
    const fixtures = [];
    for (let pot = 0; pot < 3; pot++) {
      fixtures.push({ o: drawFrom(pot, used), home: true });
      fixtures.push({ o: drawFrom(pot, used), home: false });
    }
    for (let i = fixtures.length - 1; i > 0; i--) { const j = rint(i + 1); [fixtures[i], fixtures[j]] = [fixtures[j], fixtures[i]]; }

    let pts = 0;
    fixtures.forEach((f, i) => {
      const m = playMatch(strength, f.o[1], f.home);
      pts += m.result === 'W' ? 3 : m.result === 'D' ? 1 : 0;
      record(`MD ${i + 1} \u00b7 ${f.home ? 'Home' : 'Away'}`, f.o[0], m);
    });

    // Points -> table position among 18 (anchored to realistic league-phase spreads)
    let rank = Math.round(18 - (pts / 18) * 17 + (Math.random() * 4 - 2));
    if (pts >= 16) rank = Math.min(rank, 2);
    if (pts >= 14) rank = Math.min(rank, 4);
    if (pts >= 11) rank = Math.min(rank, 7 - (Math.random() < 0.5 ? 1 : 0));
    if (pts >= 8) rank = Math.min(rank, 12);
    if (pts <= 4) rank = Math.max(rank, 13);
    rank = clamp(rank, 1, 18);
    const top4 = rank <= 4, inKO = rank <= 12;
    entries.push({ kind:'season', pts, w:entries.filter(e=>e.won).length, d, l, place: rank, gd: totGf - totGa, top8: top4, out: !inKO });

    let placeKey, placeLabel, championFlag = false;

    if (!inKO) { placeKey = 'league'; placeLabel = `${ord(rank)} \u00b7 Out in the league phase`; }
    else {
      placeKey = 'champion'; placeLabel = 'Queens of Europe'; championFlag = true;
      const rounds = top4 ? KO_ROUNDS.slice(1) : KO_ROUNDS.slice();
      for (const R of rounds) {
        const [oppName, oppR] = drawKO(R.lo, R.hi, used);
        // Two legs, aggregate
        const m1 = playMatch(strength, oppR, false);
        record(`${R.name} \u00b7 1st leg`, oppName, m1);
        const m2 = playMatch(strength, oppR, true);
        let agg1 = m1.gf + m2.gf, agg2 = m1.ga + m2.ga;
        let through = agg1 > agg2, pens = false;
        if (agg1 === agg2) {
          pens = true;
          const pWin = clamp(0.5 + (strength - oppR) * 0.014, 0.25, 0.72);
          through = Math.random() < pWin;
        }
        m2.sub = `agg ${agg1}\u2013${agg2}` + (pens ? (through ? ' \u00b7 won on pens' : ' \u00b7 lost on pens') : '');
        const rec = record(`${R.name} \u00b7 2nd leg`, oppName, m2);
        if (pens) { rec.won = through; rec.draw = false; entries[entries.length-1].won = through; entries[entries.length-1].draw = false; }
        if (!through) {
          championFlag = false;
          placeKey = R.key; placeLabel = `Out \u00b7 ${R.name}`;
          break;
        }
      }
      if (championFlag) {
        // The Final — one game, neutral ground, no draws
        const [oppName, oppR] = drawKO(85, 90, used);
        const m = playMatch(strength, oppR, null);
        if (m.result === 'D') {
          const pWin = clamp(0.5 + (strength - oppR) * 0.014, 0.25, 0.72);
          const won = Math.random() < pWin;
          m.result = won ? 'W' : 'L';
          m.sub = `${m.winPct}% to win \u00b7 ` + (won ? 'won on pens' : 'lost on pens');
        }
        record('The Final', oppName, m);
        if (m.result !== 'W') { championFlag = false; placeKey = 'runner'; placeLabel = 'Runners-up'; }
      }
    }

    const wins = entries.filter(e => e.kind === 'match' && e.won).length;
    const draws = entries.filter(e => e.kind === 'match' && e.draw).length;
    const losses = entries.filter(e => e.kind === 'match' && !e.won && !e.draw).length;
    return { strength: Math.round(strength), avg: Math.round(avg), entries,
      placeKey, placeLabel, champion: championFlag, rank, pts,
      w: wins, d: draws, l: losses, gf: totGf, ga: totGa, gd: totGf - totGa };
  }

  function ord(n) { const s = ['th','st','nd','rd'], v = n % 100; return n + (s[(v - 20) % 10] || s[v] || s[0]); }

  function recordVerdict(r) {
    if (r.placeKey === 'champion' && r.l === 0)
      return { grade:'S', medal:'\ud83d\udc51', tag:'IMMORTALS', line:'Queens of Europe without losing a single game. That XI belongs in a museum.', win:true };
    if (r.placeKey === 'champion')
      return { grade:'A+', medal:'\ud83c\udfc6', tag:'QUEENS OF EUROPE', line:'You lifted the trophy. Football immortality, secured.', win:true };
    if (r.placeKey === 'runner')
      return { grade:'A\u2212', medal:'\ud83e\udd48', tag:'RUNNERS-UP', line:'Ninety minutes from glory. The cruellest way to finish.', win:false };
    if (r.placeKey === 'sf')
      return { grade:'B+', medal:'\ud83d\udd25', tag:'SEMI-FINALS', line:'One of the last four in Europe. The trophy was so close you could hear it.', win:false };
    if (r.placeKey === 'qf')
      return { grade:'B', medal:'\ud83d\udcc8', tag:'QUARTER-FINALS', line:'A proper European run. Now build an XI that goes all the way.', win:false };
    if (r.placeKey === 'po')
      return { grade:'D', medal:'\ud83d\ude05', tag:'PLAY-OFF EXIT', line:'Knocked out before the real knockouts. The draft owes you one.', win:false };
    return { grade:'F', medal:'\ud83d\ude31', tag:'LEAGUE-PHASE EXIT', line:'Bottom third of 18. We won\u2019t tell anyone. Spin up a new XI.', win:false };
  }

  G.simulateCup = simulateCup;
  G.recordVerdict = recordVerdict;
})(typeof window !== 'undefined' ? window : (globalThis.SIMG = globalThis.SIMG || {}));
</script>

      '4-2-3-1': [['gk'],['lb','cbl','cbr','rb'],['dml','dmr'],['lw','cam','rw'],['st']],

    let lines = [`⚽ Women's European Draft — ${fk}`,''];
    for (const row of rows) {
      const parts = row.map(slotId => {
        const pl = placements[slotId];
        if (!pl) return '—';
        const emoji = POS_EMOJI[pl.slotRole] || '⚽';
        return `${emoji} ${pl.p.n} (${pl.p.r})`;

      lines.push(parts.join('  ·  '));

  function drawCard(ctx, W, placements, result) {

      const r2 = parseInt(badgeBg.slice(1,3),16)/255, g2 = parseInt(badgeBg.slice(3,5),16)/255, b2 = parseInt(badgeBg.slice(5,7),16)/255;
      const lum2 = 0.299*r2 + 0.587*g2 + 0.114*b2;
      const textCol = lum2 > 0.45 ? '#132339' : '#ffffff';
      const textColDim = lum2 > 0.45 ? 'rgba(43,33,23,0.6)' : 'rgba(255,255,255,0.65)';
      ctx.fillStyle = badgeBg;
      ctx.beginPath(); ctx.roundRect(48, y + 18, 64, 52, 6); ctx.fill();
      ctx.fillStyle = textCol;
      ctx.font = 'bold 30px Arial, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(pl.p.r, 80, y + 52);

      ctx.font = 'bold 20px Arial, sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(pl.slotRole, 128, y + 50);

    return (
      <div className="cup">
        <div className="cup-top">
          <div className="eyebrow">Eight league games. Then the knockouts.</div>
          <h1 className="h1" style={{ marginTop: 8, fontSize: 'clamp(26px,4.4vw,44px)' }}>Your European campaign</h1>
          <div className="cup-strength">Squad rating <b>{result.strength}</b> · avg {result.avg} OVR · {fk}</div>
        </div>

        <div className="ladder" ref={ladderRef}>
          {result.entries.map((e, i) =>
            e.kind === 'season'
              ? <SeasonRow key={i} e={e} show={i < rev} />
              : <MatchRow key={i} m={e} show={i < rev} />
          )}
        </div>

        {done && (
          <div className={'verdict' + (v.win ? ' win' : '')}>
            <div style={{fontFamily:'var(--font-display)', fontWeight:'var(--display-weight)', fontSize:26, color:'var(--ink)', marginBottom:8}}>Can you conquer Europe?</div>
            <div style={{display:'inline-block', background:'var(--ink)', color:'var(--bg)', fontSize:11, fontWeight:800, letterSpacing:'.12em', padding:'4px 14px', borderRadius:999, marginBottom:14}}>{mode === 'pro' ? 'PRO MODE' : 'CLASSIC MODE'}</div>
            <div style={{fontSize:12, fontWeight:700, letterSpacing:'.14em', color:'var(--ink-dim)', textTransform:'uppercase'}}>Final result</div>
            <div className="verdict-tag">{result.placeLabel}</div>
            <div style={{fontSize:20, fontWeight:800, margin:'2px 0 6px'}}>
              <span style={{color: v.win ? 'var(--win)' : ({'A+':'#00A862','A':'#00A862','A−':'#4a9d5f','B+':'#7a9d3f','B':'#b8860b','C':'#c47a1a','D':'#e5484d','F':'#e5484d'})[v.grade]}}>{v.grade}</span>
              <span style={{color:'var(--ink)', marginLeft:10, letterSpacing:'.04em'}}>{v.medal} {v.tag}</span>
            </div>
            <div className="verdict-line">{v.line}</div>
            <div className="verdict-stat">🎯 The goal: <b>lift the trophy</b> · {result.w}W {result.d}D {result.l}L · ⚽ {result.gf}–{result.ga}</div>
            <div className="cup-actions">
              <button className="btn" onClick={() => shareResult({ fk, result, placements, mode, onToast: setToast })}>Share result</button>
              <button className="btn" style={{ background:'var(--panel)', color:'var(--ink)', border:'2px solid var(--ink)' }} onClick={() => setShowXI(true)}>See your XI</button>
              <button className="btn" style={{ background:'var(--panel)', color:'var(--ink)', border:'2px solid var(--ink)' }} onClick={onReset}>Build another XI</button>
            </div>
          </div>
        )}
        {showXI && (
          <XIOverlay placements={placements} fk={fk} onClose={() => setShowXI(false)} />
        )}

        {toast && <div className="toast">{toast}</div>}
      </div>
    );
  }

  window.CupScreen = CupScreen;
})();
</script>

<script type="text/babel">// European Draft — main app
const { useState, useEffect, useMemo, useRef } = React;
const TEAMS = window.WC_TEAMS;
const FORMATIONS = window.WC_FORMATIONS;
const LS_KEY = 'w18-draft-v1';
const CFG_KEY = 'w18-cfg-v1';
const THEMES = ['broadcast', 'panini', 'clean'];

/* ---------- helpers ---------- */
const teamById = (id) => TEAMS.find((t) => t.id === id);
const surname = (n) => {const w = n.replace(/'/g, '’').split(' ');return w.length > 1 ? w.slice(-1)[0] : w[0];};
function lum(hex) {
  const h = hex.replace('#', '');const r = parseInt(h.slice(0, 2), 16) / 255,
    g = parseInt(h.slice(2, 4), 16) / 255,b = parseInt(h.slice(4, 6), 16) / 255;
  return 0.2126 * r + 0.7152 * g + 0.0722 * b;
}
const kitBg = (t) => lum(t.c1) > 0.62 ? lum(t.c2) > 0.62 ? '#2a2a2a' : t.c2 : t.c1;
const kitStripe = (t) => lum(t.c1) > 0.62 ? t.c1 : t.c2;
function shuffle(a) {const r = a.slice();for (let i = r.length - 1; i > 0; i--) {const j = Math.floor(Math.random() * (i + 1));[r[i], r[j]] = [r[j], r[i]];}return r;}

/* ---------- crest ---------- */
function Crest({ t, big }) {
  const bg = kitBg(t), stripe = kitStripe(t);
  return (
    <div className="crest" style={{ background: bg, width: big ? 56 : undefined, height: big ? 56 : undefined }}>
      <div style={{ position: 'absolute', inset: 0, background: `repeating-linear-gradient(90deg, transparent 0 7px, ${stripe}55 7px 12px)` }}></div>
      <span style={{ position: 'relative', textShadow: '0 1px 3px rgba(0,0,0,.5)' }}>{t.cc}</span>
    </div>);

}

/* ---------- mini pitch for formation card ---------- */
function MiniPitch({ fk }) {
  const slots = FORMATIONS[fk].slots;
  return (
    <div className="mini-pitch">
      {slots.map((s) =>
      <div key={s.id} className={'mini-dot' + (s.role === 'GK' ? ' gk' : '')}
      style={{ left: s.x + '%', top: s.y + '%' }}></div>
      )}
    </div>);

}

/* ---------- pitch ---------- */
function Pitch({ fk, placements, eligible, onSlot, showLines = true }) {
  const slots = FORMATIONS[fk].slots;
  return (
    <div className="pitch-frame">
      <div className="pitch">
        {showLines &&
        <div className="pitch-lines">
          <div className="pl-half"></div><div className="pl-circle"></div>
          <div className="pl-box"></div><div className="pl-box6"></div>
        </div>}
        {slots.map((s) => {
          const pl = placements[s.id];
          const isElig = eligible.has(s.id);
          return (
            <div key={s.id} className={'slot' + (isElig ? ' eligible' : '')}
            style={{ left: s.x + '%', top: s.y + '%' }}
            onClick={() => isElig && onSlot(s.id)}>
              {pl ? <Token pl={pl} /> :
              <div className="slot-empty"><span className="role">{s.role}</span></div>
              }
            </div>);

        })}
      </div>
    </div>);

}
function Token({ pl }) {
  const t = pl.team;
  return (
    <div className="player-token">
      <div className="token-badge" style={{ background: kitBg(t) }}>
        {pl.p.r}
        <span className="rt">{pl.slotRole}</span>
      </div>
      <div className="token-name">{surname(pl.p.n)}</div>
      <div className="token-meta">{t.cc} ’{String(t.year).slice(2)}</div>
    </div>);

}

/* ---------- player row ---------- */
function PlayerRow({ p, fits, selected, disabled, onClick, hideStats, teamC1, teamC2 }) {
  function luminance(hex) {
    const r = parseInt(hex.slice(1,3),16)/255;
    const g = parseInt(hex.slice(3,5),16)/255;
    const b = parseInt(hex.slice(5,7),16)/255;
    return 0.299*r + 0.587*g + 0.114*b;
  }
  const textColor = teamC1 ? (luminance(teamC1) > 0.45 ? '#2f0a38' : '#ffffff') : null;
  const pratStyle = teamC1 ? {background: teamC1, color: textColor, borderColor: teamC1} : {};
  const lStyle = teamC1 ? {color: textColor ? textColor + 'bb' : 'rgba(255,255,255,0.75)'} : {};
  return (
    <div className={'prow' + (selected ? ' sel' : '') + (disabled ? ' disabled' : '')}
    onClick={() => !disabled && onClick()}>
      {!hideStats && <div className="prat" style={pratStyle}><span className="n">{p.r}</span><span className="l" style={lStyle}>OVR</span></div>}
      {hideStats && <div className="prat" style={{fontSize:11,letterSpacing:'0.04em',color:'var(--ink-dim)',display:'flex',alignItems:'center',justifyContent:'center'}}>PRO</div>}
      <div className="pmid">
        <div className="pname">{p.n}</div>
        <div className="ptags">
          {p.p.map((pos) => <span key={pos} className={'ptag' + (fits.has(pos) ? ' fit' : '')}>{pos}</span>)}
        </div>
      </div>
      {!hideStats && <div className="pstats">
        <div className="pstat"><span className="v">{p.g}</span><span className="k">G</span></div>
        <div className="pstat"><span className="v">{p.a}</span><span className="k">A</span></div>
        <div className="pstat"><span className="v">{p.m}</span><span className="k">MP</span></div>
        <div className="pstat"><span className="v">{p.age}</span><span className="k">Age</span></div>
      </div>}
    </div>);

}

/* ================= APP ================= */
function App() {
  const cfg0 = useMemo(() => {try {return JSON.parse(localStorage.getItem(CFG_KEY)) || {};} catch {return {};}}, []);
  const [theme] = useState('panini');
  const [strict, setStrict] = useState(cfg0.strict == null ? true : cfg0.strict);
  const [accent, setAccent] = useState(cfg0.accent === undefined ? '#E9B824' : cfg0.accent);
  const [pitchLines, setPitchLines] = useState(cfg0.pitchLines == null ? true : cfg0.pitchLines);
  useEffect(() => {
    localStorage.setItem(CFG_KEY, JSON.stringify({ theme, strict, accent, pitchLines }));
  }, [theme, strict, accent, pitchLines]);

  const saved = useMemo(() => {try {return JSON.parse(localStorage.getItem(LS_KEY)) || {};} catch {return {};}}, []);
  const [phase, setPhase] = useState(saved.phase || 'mode');
  const [mode, setMode] = useState(saved.mode || null); // 'classic' | 'pro'
  const [fk, setFk] = useState(saved.fk || '4-3-3');
  const [placements, setPlacements] = useState(saved.placements || {}); // slotId -> {p, team, slotRole}
  const [usedTeams, setUsedTeams] = useState(saved.usedTeams || []);
  const [currentId, setCurrentId] = useState(saved.currentId || null);
  const [respins, setRespins] = useState(saved.respins == null ? 3 : saved.respins);
  const [confirmReset, setConfirmReset] = useState(false);
  useEffect(() => {
    if (!confirmReset) return;
    const t = setTimeout(() => setConfirmReset(false), 4000);
    return () => clearTimeout(t);
  }, [confirmReset]);
  const [cupRun, setCupRun] = useState(saved.cupRun || null);
  const [spinning, setSpinning] = useState(false);
  const [selIdx, setSelIdx] = useState(null);
  const [mobileTab, setMobileTab] = useState('players');

  useEffect(() => {document.documentElement.setAttribute('data-theme', theme);}, [theme]);
  useEffect(() => {
    const root = document.documentElement.style;
    if (accent) {root.setProperty('--accent', accent);root.setProperty('--accent-ink', lum(accent) > 0.6 ? '#08130c' : '#fff');} else
    {root.removeProperty('--accent');root.removeProperty('--accent-ink');}
  }, [accent, theme]);
  useEffect(() => {
    localStorage.setItem(LS_KEY, JSON.stringify({ phase, mode, fk, placements, usedTeams, currentId, respins, cupRun }));
  }, [phase, fk, placements, usedTeams, currentId, respins, cupRun]);

  const formation = FORMATIONS[fk];
  const filledCount = Object.keys(placements).length;
  const round = filledCount + 1;
  const current = currentId ? teamById(currentId) : null;

  const openSlots = useMemo(() => formation.slots.filter((s) => !placements[s.id]), [formation, placements]);
  const teamHasEligible = (team) => !team || team.squad.some((p) => openSlots.some((s) => s.accepts.some((a) => p.p.includes(a))));
  const [deadEnd, setDeadEnd] = useState(false);
  useEffect(() => {
    if (current && !spinning && openSlots.length > 0 && !teamHasEligible(current)) {
      setDeadEnd(true);
      const t = setTimeout(() => { setDeadEnd(false); doSpin(true, true); }, 2200);
      return () => clearTimeout(t);
    }
    setDeadEnd(false);
  }, [currentId, spinning]);

  // which open slots does a player fit?
  const slotsForPlayer = (p) => openSlots.filter((s) => strict ? s.accepts.some((a) => p.p.includes(a)) : true);
  const playerFits = (p) => slotsForPlayer(p).length > 0;
  // tags on the player that match some open slot (for green highlight)
  const fitTagsFor = (p) => {
    const set = new Set();
    openSlots.forEach((s) => s.accepts.forEach((a) => {if (p.p.includes(a)) set.add(a);}));
    return set;
  };

  const selPlayer = current && selIdx != null ? current.squad[selIdx] : null;
  const eligibleSlots = useMemo(() => {
    if (!selPlayer) return new Set();
    return new Set(slotsForPlayer(selPlayer).map((s) => s.id));
  }, [selPlayer, openSlots, strict]);

  /* ---- actions ---- */
  const [spinDisplay, setSpinDisplay] = useState(null); // {cc, name} shown during spin

  function doSpin(isRespin, free) {
    if (spinning) return;
    if (isRespin && !free) {if (respins <= 0) return;setRespins((r) => r - 1);}
    setSelIdx(null);
    const prevId = currentId;
    setCurrentId(null);
    setSpinning(true);
    let pool = TEAMS.filter((t) => !usedTeams.includes(t.id) && t.id !== prevId);
    if (free) {
      // Free re-spin after a dead-end team: guarantee the next team has an eligible player
      const fitting = pool.filter((t) => teamHasEligible(t));
      if (fitting.length) pool = fitting;
    }
    const pick = shuffle(pool)[0];

    const allTeams = TEAMS.slice();
    const interval = 175;
    const duration = 3000;
    let elapsed = 0;

    // Show first flag immediately
    const firstTeam = allTeams[Math.floor(Math.random() * allTeams.length)];
    setSpinDisplay(firstTeam);

    const tick = () => {
      const randTeam = allTeams[Math.floor(Math.random() * allTeams.length)];
      setSpinDisplay(randTeam);
      elapsed += interval;
      if (elapsed < duration) {
        setTimeout(tick, interval);
      } else {
        setSpinDisplay(pick);
        setTimeout(() => {setCurrentId(pick.id);setSpinning(false);setSpinDisplay(null);}, 400);
      }
    };
    setTimeout(tick, interval);
  }

  function placeAt(slotId) {
    if (!selPlayer || !current) return;
    const slot = formation.slots.find((s) => s.id === slotId);
    setPlacements((prev) => ({ ...prev, [slotId]: { p: selPlayer, team: current, slotRole: slot.role } }));
    setUsedTeams((prev) => [...prev, current.id]);
    setCurrentId(null);setSelIdx(null);
    if (filledCount + 1 >= 11) setTimeout(() => setPhase('final'), 350);
  }

  function startDraft() {setPhase('draft');}
  function pickMode(m) {setMode(m);setPhase('formation');}
  function enterCup() {
    let run = cupRun;
    if (!run) {
      const ratings = Object.values(placements).map((x) => x.p.r);
      run = window.simulateCup(ratings, fk);
      setCupRun(run);
    }
    setPhase('cup');
  }
  function resetGame() {
    setPlacements({});setUsedTeams([]);setCurrentId(null);setSelIdx(null);
    setRespins(3);setSpinning(false);setCupRun(null);setMode(null);setPhase('mode');
  }

  /* ================= RENDER ================= */
  return (
    <div className="app">
      <header className="topbar">
        <div className="brand"><span className="dot"></span>WIN&nbsp;ALL&nbsp;GAMES</div>
        <div className="spacer"></div>
        {phase !== 'formation' && !confirmReset &&
        <button className="btn ghost" onClick={() => setConfirmReset(true)} title="Start over">Reset</button>
        }
        {phase !== 'formation' && confirmReset &&
        <span style={{display:'flex', alignItems:'center', gap:8}}>
          <span style={{fontSize:13, fontWeight:700, color:'var(--ink-dim)'}}>Reset game?</span>
          <button className="btn" style={{background:'var(--accent)', color:'var(--accent-ink)'}} onClick={() => {setConfirmReset(false); resetGame();}}>Yes, reset</button>
          <button className="btn ghost" onClick={() => setConfirmReset(false)}>Cancel</button>
        </span>
        }
      </header>

      {phase === 'mode' &&
      <ModeScreen onPick={pickMode} />}
      {phase === 'formation' &&
      <FormationScreen fk={fk} setFk={setFk} onStart={startDraft} />
      }

      {phase === 'draft' &&
      <div className="draft">
          <div className="mobile-tabs">
            <button className={'mobile-tab' + (mobileTab === 'players' ? ' active' : '')} onClick={() => setMobileTab('players')}>Players</button>
            <button className={'mobile-tab' + (mobileTab === 'pitch' ? ' active' : '')} onClick={() => setMobileTab('pitch')}>My XI</button>
          </div>
          <section className={'pitch-pane' + (mobileTab === 'pitch' ? ' mobile-visible' : '')}>
            <div className="draft-head">
              <div className="round-chip">
                <span className="lab">Round</span>
                <span className="val">{Math.min(round, 11)}<small>/11</small></span>
              </div>
              <div className="formation-pill">{formation.name}</div>
              <div className="respins">
                Re-spins
                <span className="pips">
                  {[0, 1, 2].map((i) => <span key={i} className={'pip' + (i >= respins ? ' used' : '')}></span>)}
                </span>
              </div>
            </div>
            <Pitch fk={fk} placements={placements} eligible={eligibleSlots} onSlot={placeAt} showLines={pitchLines} />
          </section>

          <aside className={'side' + (mobileTab === 'players' ? ' mobile-visible' : '')}>
            <div className="side-spin" style={{padding:'10px 16px 8px'}}>
              {!current ?
            <div className="spin-stage">
                  <button className={'spin-btn' + (spinning ? ' spinning' : '')}
              onClick={() => doSpin(false)} disabled={spinning}>
                    {spinning && spinDisplay
                      ? <span className="spin-btn-flag" style={{background: kitBg(spinDisplay), transition:'background .22s ease', animation:'none', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center'}}>
                          <span style={{position:'relative', fontSize:22, fontWeight:800, textShadow:'0 1px 3px rgba(0,0,0,.55)', color:'#fff'}}>{spinDisplay.cc}</span>
                          <span style={{position:'relative', fontSize:9, fontWeight:700, letterSpacing:'.08em', textShadow:'0 1px 3px rgba(0,0,0,.55)', color:'#fff', opacity:.9}}>{spinDisplay.year}</span>
                        </span>
                      : <><span>SPIN</span><small>RANDOM TEAM</small></>
                    }
                  </button>
                  {!spinning && <div className="spin-hint">Spin to draw a random legendary squad, then draft one player onto your XI.</div>}
                </div> :

            <div style={{display:'flex',alignItems:'center',gap:10,width:'100%'}}>
                  <Crest t={current} big />
                  <div className="tinfo" style={{flex:1}}>
                    <div className="tname">{current.team}</div>
                    <div className="tyear">{current.year} · {current.ctry}</div>
                    {current.champ && <span className="champ-tag">★ European Champions</span>}
                  </div>
                  <button className="btn ghost" style={{fontSize:12,padding:'6px 10px',whiteSpace:'nowrap'}}
              disabled={respins <= 0} onClick={() => doSpin(true)}>
                    {respins > 0 ? `Re-spin (${respins})` : 'No re-spins'}
                  </button>
                </div>
            }
            </div>

            {current &&
          <>
                {deadEnd &&
                <div style={{background:'var(--accent)', color:'var(--accent-ink)', fontSize:12, fontWeight:800, padding:'8px 14px', textAlign:'center', letterSpacing:'.02em'}}>
                  No one here fits your open positions — free re-spin! 🎁
                </div>
                }
                <div className="pick-prompt" style={{fontSize:11,padding:'4px 14px'}}>
                  Tap a player, then tap a slot below
                </div>
                <div className="player-list">
                  {current.squad.map((p, i) => {
                const fit = playerFits(p);
                return (
                  <PlayerRow key={i} p={p} fits={fitTagsFor(p)}
                  selected={selIdx === i} disabled={!fit}
                  hideStats={mode === 'pro'}
                  teamC1={current ? (current.c1 || null) : null}
                  teamC2={current ? (current.c2 || null) : null}
                  onClick={() => setSelIdx(i)} />);

              })}
                </div>
              </>
          }
            {!current &&
          <div className="player-list">
                <div style={{ color: 'var(--ink-dim)', fontSize: 13, padding: '20px 8px', textAlign: 'center', lineHeight: 1.5 }}>
                  {filledCount === 0 ?
              'Your pitch is empty. Hit SPIN to draw your first squad.' :
              `${filledCount} of 11 positions filled. Spin again for the next pick.`}
                </div>
              </div>
          }

            {/* Mobile mini-slots bar */}
            <MobileSlotsBar fk={fk} placements={placements} eligibleSlots={eligibleSlots} selPlayer={selPlayer} onPlace={placeAt} />

          </aside>
        </div>
      }

      {phase === 'final' &&
      <FinalScreen fk={fk} placements={placements} mode={mode} onReset={resetGame} onEnter={enterCup} showLines={pitchLines} />
      }

      {phase === 'cup' && cupRun &&
      <window.CupScreen fk={fk} result={cupRun} placements={placements} mode={mode}
        onBack={() => setPhase('final')} onReset={resetGame} />
      }

      <TweaksPanel>
        <TweakSection label="Look" />
        <TweakColor label="Accent" value={accent}
        options={['#E9B824', '#1ef08a', '#37d4ff', '#ff5d73', '#ffb020']}
        onChange={setAccent} />
        <TweakToggle label="Pitch markings" value={pitchLines}
        onChange={setPitchLines} />
        <TweakSection label="Rules" />
        <TweakToggle label="Strict positions" value={strict}
        onChange={setStrict} />
        <TweakButton label="Start a new game" onClick={resetGame} />
      </TweaksPanel>
    </div>);

}

/* ---------- mode screen ---------- */
function ModeScreen({ onPick }) {
  return (
    <div className="screen">
      <div className="center-wrap">
        <div className="eyebrow">Women’s European Draft</div>
        <h1 className="h1">Choose your <em>mode</em></h1>
        <div style={{ background:'var(--ink)', color:'var(--bg)', padding:'12px 22px', borderRadius:'var(--radius)', margin:'6px 0 14px', textAlign:'center', maxWidth:560 }}>
          <div style={{ fontSize:15, fontWeight:800, letterSpacing:'.03em' }}>THE GOAL: WIN EVERY GAME. <span style={{color:'#F0BC42'}}>BECOME QUEENS OF EUROPE.</span></div>
        </div>
        <div style={{ display:'flex', gap:20, flexWrap:'wrap', justifyContent:'center', marginTop:8 }}>
          <div className="fcard" style={{ width:260, cursor:'pointer' }} onClick={() => onPick('classic')}>
            <div className="fname">Classic</div>
            <div className="fsub">Full stats visible — OVR rating, goals, assists and appearances. Make informed picks.</div>
            <div style={{ marginTop:14, fontSize:13, color:'var(--accent)', fontWeight:700, letterSpacing:'.04em' }}>RECOMMENDED</div>
          </div>
          <div className="fcard" style={{ width:260, cursor:'pointer' }} onClick={() => onPick('pro')}>
            <div className="fname">Pro</div>
            <div className="fsub">Stats hidden — you only see names and positions. Draft from memory and prove your football knowledge.</div>
            <div style={{ marginTop:14, fontSize:13, color:'var(--ink-dim)', fontWeight:700, letterSpacing:'.04em' }}>HARDER</div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ---------- mobile slots bar ---------- */
function MobileSlotsBar({ fk, placements, eligibleSlots, selPlayer, onPlace }) {
  const formation = window.WC_FORMATIONS[fk];
  if (!formation) return null;
  const hasSelection = !!selPlayer;

  return (
    <div className="mobile-slots-bar">
      {formation.slots.map(slot => {
        const placed = placements[slot.id];
        const isEligible = hasSelection && eligibleSlots.has(slot.id);
        const initials = placed
          ? placed.p.n.split(' ').map(w => w[0]).slice(-2).join('')
          : null;
        return (
          <div
            key={slot.id}
            className={'mobile-slot' + (isEligible ? ' eligible' : '') + (placed ? ' filled' : '')}
            onClick={() => isEligible && onPlace(slot.id)}
          >
            <span className="mobile-slot-label">
              {placed ? initials : slot.role}
            </span>
          </div>
        );
      })}
    </div>
  );
}

/* ---------- formation screen ---------- */
function FormationScreen({ fk, setFk, onStart }) {
  return (
    <div className="screen"><div className="center-wrap">
      <div>
        <div className="eyebrow">Build your all-time XI</div>
        <h1 className="h1" style={{ marginTop: 14 }}>Choose your <em>formation</em></h1>
        <p className="sub" style={{ margin: '14px auto 0' }}>
          Eleven rounds, eleven legends — one player from a random legendary women’s European squad each spin.
          Start by picking how your team lines up.
        </p>
      </div>
      <div className="formation-grid">
        {Object.keys(FORMATIONS).map((key) => {
            const f = FORMATIONS[key];
            return (
              <div key={key} className={'fcard' + (fk === key ? ' sel' : '')} onClick={() => setFk(key)}>
              <div className="check">✓</div>
              <div className="fname">{f.name}</div>
              <div className="fsub">{f.sub}</div>
              <MiniPitch fk={key} />
            </div>);

          })}
      </div>
      <button className="btn" onClick={onStart}>Let’s get started →</button>
    </div></div>);

}

/* ---------- final screen ---------- */
function shareSquadFromFinal({ fk, placements, mode }) {
  const POS_EMOJI = { GK:'🧤', RB:'🛡️', LB:'🛡️', CB:'🛡️', DM:'⚙️', CM:'⚙️', AM:'✨', RW:'⚡', LW:'⚡', ST:'⚽' };
  const FORMATION_ROWS = {
    '4-3-3': [['gk'],['lb','cbl','cbr','rb'],['cml','cmc','cmr'],['lw','st','rw']],
    '4-2-3-1': [['gk'],['lb','cbl','cbr','rb'],['dml','dmr'],['lw','cam','rw'],['st']],
    '4-4-2': [['gk'],['lb','cbl','cbr','rb'],['lm','cml','cmr','rm'],['stl','str']],
  };
  const rows = FORMATION_ROWS[fk] || FORMATION_ROWS['4-3-3'];
  const modeTag = mode === 'pro' ? '🧠 Pro mode' : '📋 Classic mode';
  let lines = [modeTag, `⚽ Women's European Draft — ${fk}`, ''];
  for (const row of rows) {
    const parts = row.map(slotId => {
      const pl = placements[slotId];
      if (!pl) return '—';
      return `${POS_EMOJI[pl.slotRole] || '⚽'} ${pl.p.n} (${pl.p.r})`;
    });
    lines.push(parts.join('  ·  '));
  }
  const text = lines.join('\n');
  const url = location.href.split('#')[0];
  if (navigator.share) {
    navigator.share({ title: 'Women\u2019s European Draft — My XI', text, url }).catch(() => {});
  } else {
    navigator.clipboard.writeText(text + '\n' + url).then(() => {}, () => {});
  }
}

function FinalScreen({ fk, placements, mode, onReset, onEnter, showLines }) {
  const players = Object.values(placements).map((x) => x.p);
  const avg = Math.round(players.reduce((s, p) => s + p.r, 0) / players.length);
  const star = players.slice().sort((a, b) => b.r - a.r)[0];
  return (
    <div className="final">
      <div style={{ textAlign: 'center' }}>
        <div className="eyebrow">Squad complete · 11 / 11</div>
        <h1 className="h1" style={{ marginTop: 10, fontSize: 'clamp(26px,4.5vw,42px)' }}>Your all-time women’s European XI</h1>
        <div className="cup-strength">Avg {avg} OVR · star: {star.n} ({star.r})</div>
      </div>
      <Pitch fk={fk} placements={placements} eligible={new Set()} onSlot={() => {}} showLines={showLines} />
      <div className="final-actions">
        <button className="btn" onClick={onEnter}>Start the campaign →</button>
        <button className="btn ghost" onClick={() => shareSquadFromFinal({ fk, placements, mode })}>Share my XI</button>
        <button className="btn ghost" onClick={onReset}>Build another XI</button>
      </div>
    </div>);

}

window.FinalScreen = FinalScreen;
ReactDOM.createRoot(document.getElementById('root')).render(<App />);</script>
